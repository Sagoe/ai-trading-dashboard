name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Find frontend folder
        run: |
          echo "Root contents:"
          ls -la
          echo "Looking for frontend:"
          find . -name "package.json" -not -path "*/node_modules/*" | head -20

      - name: Install dependencies
        run: |
          cd ai-trading-dashboard/frontend
          npm install

      - name: Build
        run: |
          cd ai-trading-dashboard/frontend
          export VITE_BACKEND_URL=https://ai-trading-dashboard-sotg.onrender.com
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ai-trading-dashboard/frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
